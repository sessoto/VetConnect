services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vetconnect
      POSTGRES_PASSWORD: vetconnect
      POSTGRES_DB: vetconnect
    ports:
      - "5432:5432"
    volumes:
      - vetconnect_pg:/var/lib/postgresql/data

volumes:
  vetconnect_pg:
